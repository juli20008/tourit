services:
  - type: web
    name: yillow-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths:
        - app/**
        - migrations/**
        - wsgi.py
        - requirements.txt
        - Dockerfile
        - render.yaml
        - photo_to_video.py
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: http://localhost:3000
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: FISH_AUDIO_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
