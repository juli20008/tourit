name: Image Backfill

on:
  schedule:
    - cron: "0 9 * * 0"   # Weekly, Sunday 9am UTC
  workflow_dispatch:
    inputs:
      max_listings:
        description: "Max GetObject calls per run (split large backfills)"
        required: false
        default: "5000"
      delay_ms:
        description: "Delay between GetObject calls in ms (default 2000)"
        required: false
        default: "2000"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run image backfill
        env:
          DDF_LOGIN_URL:             ${{ secrets.DDF_LOGIN_URL }}
          DDF_USERNAME:              ${{ secrets.DDF_USERNAME }}
          DDF_PASSWORD:              ${{ secrets.DDF_PASSWORD }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ./node_modules/.bin/ts-node lib/scripts/imageBackfill.ts \
            --max=${{ github.event.inputs.max_listings || '500' }} \
            --delay-ms=${{ github.event.inputs.delay_ms || '2000' }}
