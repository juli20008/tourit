name: Image Backfill

on:
  schedule:
    - cron: "0 3 * * *"   # Daily 3am UTC (after geocoding at 2am)
  workflow_dispatch:
    inputs:
      state:
        description: "Province to backfill (e.g. Ontario)"
        required: false
        default: "Ontario"
      max_listings:
        description: "Max GetObject calls per run (split large backfills)"
        required: false
        default: "2000"
      delay_ms:
        description: "Delay between GetObject calls in ms"
        required: false
        default: "800"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run image backfill
        env:
          DDF_LOGIN_URL:             ${{ secrets.DDF_LOGIN_URL }}
          DDF_USERNAME:              ${{ secrets.DDF_USERNAME }}
          DDF_PASSWORD:              ${{ secrets.DDF_PASSWORD }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STATE="${{ github.event.inputs.state || 'Ontario' }}"
          MAX="${{ github.event.inputs.max_listings || '2000' }}"
          DELAY="${{ github.event.inputs.delay_ms || '800' }}"
          ./node_modules/.bin/ts-node lib/scripts/backfillCityPhotos.ts \
            --all \
            --state="$STATE" \
            --max="$MAX" \
            --delay-ms="$DELAY"
