name: Deactivate Stale Listings

on:
  schedule:
    - cron: "0 6 * * 0"   # Weekly, Sunday 6 AM UTC
  workflow_dispatch:
    inputs:
      days:
        description: "Mark inactive if not seen in this many days"
        required: false
        default: "30"
      dry_run:
        description: "Dry run (true/false)"
        required: false
        default: "false"

jobs:
  deactivate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deactivate stale listings
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FLAGS="--days=${{ github.event.inputs.days || '30' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          ./node_modules/.bin/ts-node lib/scripts/deactivateStale.ts $FLAGS
