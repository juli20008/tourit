name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min — absorbs GitHub's scheduling delays
  workflow_dispatch:          # allow manual trigger to prevent workflow auto-disable

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API warmup
        run: curl -sf --max-time 30 https://api.tourit.ca/warmup > /dev/null
