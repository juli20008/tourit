name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min — enough to beat Render's 15-min sleep timer
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (checks DB too)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://api.tourit.ca/health)
          if [ "$STATUS" != "200" ]; then
            echo "::error::api.tourit.ca/health returned HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"

      - name: Ping /warmup (pre-warms map cache)
        run: curl -sf --max-time 45 https://api.tourit.ca/warmup > /dev/null || true
