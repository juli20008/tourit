name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min (GitHub's minimum)
    - cron: '2-59/5 * * * *' # offset by 2 min — double-coverage against scheduler jitter
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API warmup
        run: curl -sf --max-time 30 https://api.tourit.ca/warmup > /dev/null
