name: DDF Sync

on:
  schedule:
    - cron: "0 7 * * *"   # 3am EST / 7am UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compute 26-hour lookback timestamp
        id: ts
        run: echo "since=$(date -u -d '26 hours ago' '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Run DDF sync
        env:
          DDF_LOGIN_URL:              ${{ secrets.DDF_LOGIN_URL }}
          DDF_USERNAME:               ${{ secrets.DDF_USERNAME }}
          DDF_PASSWORD:               ${{ secrets.DDF_PASSWORD }}
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DDF_LAST_UPDATED:           ${{ steps.ts.outputs.since }}
        run: ./node_modules/.bin/ts-node lib/services/ddfSync.ts

      - name: Deactivate stale listings
        env:
          DDF_LOGIN_URL:              ${{ secrets.DDF_LOGIN_URL }}
          DDF_USERNAME:               ${{ secrets.DDF_USERNAME }}
          DDF_PASSWORD:               ${{ secrets.DDF_PASSWORD }}
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: ./node_modules/.bin/ts-node lib/scripts/deactivateStale.ts
