name: DDF Sync

on:
  schedule:
    - cron: "0 7 * * *"   # 3am EST / 7am UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run DDF sync
        env:
          DDF_LOGIN_URL:              ${{ secrets.DDF_LOGIN_URL }}
          DDF_USERNAME:               ${{ secrets.DDF_USERNAME }}
          DDF_PASSWORD:               ${{ secrets.DDF_PASSWORD }}
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx ts-node lib/services/ddfSync.ts
