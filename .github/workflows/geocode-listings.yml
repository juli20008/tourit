name: Geocode Listings

on:
  schedule:
    - cron: "0 8 * * *"   # 4am EST / 8am UTC — runs after ddf-sync (7am UTC)
  workflow_dispatch:
    inputs:
      state:
        description: "Province to geocode (e.g. Ontario)"
        required: false
        default: "Ontario"
      limit:
        description: "Max listings to process per run (leave blank for all)"
        required: false
        default: "99999"

jobs:
  geocode:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run geocoder
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ./node_modules/.bin/ts-node lib/scripts/geocodeListings.ts \
            --state=${{ github.event.inputs.state }} \
            --limit=${{ github.event.inputs.limit }}
