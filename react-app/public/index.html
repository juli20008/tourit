<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<script>
			// Pre-ping the Render backend the moment the browser receives this HTML —
			// before React JS downloads or mounts. This starts the cold-start clock
			// ~3-5 s earlier so real API calls find a warm container.
			fetch('https://api.tourit.ca/warmup', { credentials: 'include' }).catch(function () {});
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Inter:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
		<script
			src="https://kit.fontawesome.com/e113e043f0.js"
			crossorigin="anonymous"
		></script>
		<link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
	<title>tourit.ca — Home Tour Simplified</title>
	<style>
		/* Suppress all Google Translate chrome — we use our own button */
		.goog-te-banner-frame,
		.goog-te-balloon-frame,
		.skiptranslate,
		#goog-gt-tt,
		.goog-tooltip,
		.goog-te-spinner,
		[id^="goog-gt-"],
		iframe.goog-te-menu-frame { display: none !important; }
		body { top: 0 !important; }
		body.translated-ltr, body.translated-rtl { top: 0 !important; }
	</style>
	</head>
	<body>
		<div id="root"></div>
		<div id="google_translate_element" style="display:none"></div>
		<script>
			// Google Translate callback — called after element.js loads
			function googleTranslateElementInit() {
				new google.translate.TranslateElement(
					{ pageLanguage: 'en', includedLanguages: 'zh-CN', autoDisplay: false },
					'google_translate_element'
				);
			}

			// Suppress the toolbar and spinner Google injects
			(function () {
				var SPINNER_SELECTORS = [
					'.goog-te-banner-frame',
					'.goog-te-spinner',
				];
				function suppressGoogleUI() {
					if (document.body && document.body.style.top !== '0px')
						document.body.style.setProperty('top', '0px', 'important');
					SPINNER_SELECTORS.forEach(function (sel) {
						document.querySelectorAll(sel).forEach(function (el) {
							el.style.setProperty('display', 'none', 'important');
						});
					});
				}
				var obs = new MutationObserver(suppressGoogleUI);
				obs.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['style'] });
				document.addEventListener('DOMContentLoaded', function () {
					new MutationObserver(suppressGoogleUI)
						.observe(document.body, { attributes: true, attributeFilter: ['style'] });
				});
			})();

			// Google Translate script is loaded ON DEMAND by LangToggle.js — not here.
			// This keeps the English page completely free of Google's translation engine.
		</script>
	</body>
</html>
