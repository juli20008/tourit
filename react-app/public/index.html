<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
		<script
			src="https://kit.fontawesome.com/e113e043f0.js"
			crossorigin="anonymous"
		></script>
		<link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
	<title>Tourit.ca</title>
	<style>
		/* Suppress all Google Translate chrome — we use our own button */
		.goog-te-banner-frame,
		.goog-te-balloon-frame,
		.skiptranslate,
		#goog-gt-tt,
		.goog-tooltip { display: none !important; }
		/* Prevent Google from pushing body down */
		body { top: 0 !important; }
		body.translated-ltr, body.translated-rtl { top: 0 !important; }
	</style>
	</head>
	<body>
		<div id="root"></div>
		<div id="google_translate_element" style="display:none"></div>
		<script>
			function googleTranslateElementInit() {
				new google.translate.TranslateElement(
					{ pageLanguage: 'en', includedLanguages: 'zh-CN', autoDisplay: false },
					'google_translate_element'
				);
			}

			// Google injects a banner iframe and sets body.style.top to push content down.
			// Watch for both and undo them immediately.
			(function () {
				function suppressBanner() {
					// Force body back to top:0
					if (document.body && document.body.style.top !== '0px') {
						document.body.style.setProperty('top', '0px', 'important');
					}
					// Hide the banner iframe if it slipped through CSS
					var banner = document.querySelector('.goog-te-banner-frame');
					if (banner) banner.style.setProperty('display', 'none', 'important');
				}

				// Watch for DOM changes (Google inserts the iframe dynamically)
				var obs = new MutationObserver(suppressBanner);
				obs.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['style'] });

				// Also catch inline style changes on body directly
				var bodyObs = new MutationObserver(suppressBanner);
				document.addEventListener('DOMContentLoaded', function () {
					bodyObs.observe(document.body, { attributes: true, attributeFilter: ['style'] });
				});
			})();
		</script>
		<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
	</body>
</html>
