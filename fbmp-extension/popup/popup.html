<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tourit → FBMP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      color: #0f172a;
      background: #ffffff;
      width: 280px;
      padding: 16px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e2e8f0;
    }
    header img { width: 28px; height: 28px; border-radius: 6px; }
    header h1 { font-size: 14px; font-weight: 700; color: #0f172a; }
    header span { font-size: 11px; color: #94a3b8; margin-left: auto; }

    /* ── Login gate ── */
    #login-gate {
      display: none;
      text-align: center;
      padding: 12px 0 4px;
    }
    #login-gate .gate-icon { font-size: 28px; margin-bottom: 8px; }
    #login-gate p { font-size: 12px; color: #64748b; line-height: 1.6; margin-bottom: 12px; }
    #login-gate a {
      display: block; width: 100%; padding: 9px;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      background: #2563eb; color: #fff; text-decoration: none;
      transition: background 0.15s; margin-bottom: 6px;
    }
    #login-gate a:hover { background: #1d4ed8; }

    /* ── Main section ── */
    #main-section { display: none; }

    #no-listing {
      color: #64748b;
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
      padding: 12px 0;
    }
    #listing-info { display: none; }
    .listing-address { font-weight: 700; font-size: 13px; color: #0f172a; margin-bottom: 4px; }
    .listing-meta { font-size: 11px; color: #64748b; margin-bottom: 2px; }
    .listing-imgs { font-size: 11px; color: #2563eb; margin-bottom: 12px; }

    .btn {
      display: block; width: 100%; padding: 9px;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; margin-bottom: 6px;
      transition: background 0.15s;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-ghost { background: #f1f5f9; color: #475569; }
    .btn-ghost:hover { background: #e2e8f0; }
    .btn-capture { background: #0f172a; color: #fff; }
    .btn-capture:hover { background: #1e293b; }

    .status-line {
      font-size: 11px; min-height: 16px;
      margin-bottom: 6px; text-align: center;
    }
    #capture-status { color: #16a34a; }
    .status-line.error { color: #dc2626; }

    /* ── Credits ── */
    #credits-section {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid #f1f5f9;
    }
    .credits-bar {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: #64748b; margin-bottom: 4px;
    }
    .btn-refresh {
      background: none; border: none; cursor: pointer;
      color: #94a3b8; font-size: 13px; padding: 0 2px; line-height: 1;
    }
    .btn-refresh:hover { color: #64748b; }

    #credits-buy { display: none; margin-top: 8px; }
    #credits-buy .qty-row {
      display: flex; gap: 6px; align-items: center; margin-bottom: 6px;
    }
    #credits-buy input[type=number] {
      width: 56px; padding: 5px 6px; border-radius: 6px;
      border: 1px solid #e2e8f0; font-size: 13px; text-align: center;
    }
    #credits-buy .qty-hint { font-size: 11px; color: #94a3b8; }

    footer {
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid #f1f5f9;
      font-size: 10px; color: #94a3b8; text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <img src="../icons/icon48.png" alt="Tourit" />
    <h1>Tourit → FBMP</h1>
    <span>One-click listing sync</span>
  </header>

  <!-- Shown when no agent is logged in -->
  <div id="login-gate">
    <div class="gate-icon">🔐</div>
    <p>Please log in to your agent account<br />to use this extension.</p>
    <a href="https://www.tourit.ca/agent-login" target="_blank">Log in at tourit.ca →</a>
  </div>

  <!-- Shown when agent is logged in -->
  <div id="main-section">
    <div id="no-listing">
      No listing captured yet.<br />
      Open a listing on <strong>tourit.ca</strong> and click <strong>Save to FBMP</strong>, or use the button below.
    </div>

    <button class="btn btn-capture" id="btn-capture">📋 Capture Current Listing</button>
    <div class="status-line" id="capture-status"></div>

    <div id="listing-info">
      <div class="listing-address" id="listing-address"></div>
      <div class="listing-meta"    id="listing-meta"></div>
      <div class="listing-imgs"    id="listing-imgs"></div>
      <button class="btn btn-primary" id="btn-open-fbmp">Open FBMP Create Listing →</button>
      <button class="btn btn-ghost"   id="btn-clear">Clear captured listing</button>
    </div>

    <div id="credits-section">
      <div class="credits-bar">
        <span id="credits-text">Credits loading…</span>
        <button class="btn-refresh" id="btn-refresh-credits" title="Refresh credits">↻</button>
      </div>
      <div id="credits-buy">
        <div class="qty-row">
          <input type="number" id="credits-qty" value="10" min="1" max="50" />
          <span class="qty-hint">uses × $1/use CAD</span>
        </div>
        <button class="btn btn-primary" id="btn-buy">Top up via PayPal</button>
        <div class="status-line" id="buy-status"></div>
      </div>
    </div>
  </div>

  <footer>Tourit.ca &middot; Julie Li, Bay Street Group</footer>

  <script src="popup.js"></script>
</body>
</html>
